{% load static %}


<!doctype html>

  <head>
  	<title>Bonita Dashboard</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

	<link href="https://fonts.googleapis.com/css?family=Lato:300,400,700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />    

	<!-- <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css"> -->
	
	<link rel="stylesheet" href="{% static 'index.css' %}">

	</head>
	<body>

		<section class="ftco-section">
		<div class="container">
			<div class="row justify-content-center">
				<div class="col-md-6 text-center mb-5">
					<h2 class="heading-section">Bonita Dashboard Login</h2>
				</div>
			</div>
			<div class="row justify-content-center">
				<div class="col-md-7 col-lg-5">
					<div class="login-wrap p-4 p-md-5">
		      	<div class="d-flex">
		      		<div class="w-100">
		      			<h3 class="mb-4">Bejelentkezés</h3>
		      			{% if error %}
		      			<div class="alert alert-danger" role="alert">{{ error }}</div>
		      			{% endif %}
		      		</div>
							<!-- <div class="w-100">
								<p class="social-media d-flex justify-content-end">
									<a href="#" class="social-icon d-flex align-items-center justify-content-center"><span class="fa fa-facebook"></span></a>
									<a href="#" class="social-icon d-flex align-items-center justify-content-center"><span class="fa fa-twitter"></span></a>
								</p>
							</div> -->
		      	</div>
						<form action="#" method="post" enctype="multipart/form-data">{% csrf_token %}
		      		<div class="form-group">
		      			<div class="icon d-flex align-items-center justify-content-center bg-danger"><span class="fa fa-user"></span></div>
		      			<input type="text" class="form-control rounded-left" name="username" placeholder="Felhasználó" required>
		      		</div>
	            <div class="form-group">
	            	<div class="icon d-flex align-items-center justify-content-center bg-danger"><span class="fa fa-lock"></span></div>
	              <input type="password" class="form-control rounded-left" name="password" placeholder="Jelszó" required>
	            </div>
	            <div class="form-group d-flex align-items-center">
	            	<div class="w-100">
	            		<!-- <label class="checkbox-wrap checkbox-primary mb-0">Save Password
									  <input type="checkbox" checked>
									  <span class="checkmark"></span>
									</label> -->
								</div>
								<div class="w-100 d-flex justify-content-end">
		            	<button type="submit" class="btn btn-danger rounded submit" name="belepes">OK</button>
	            	</div>
	            </div>
	            <div class="form-group mt-4">
								<div class="w-100 text-center">
									<!-- <p class="mb-1">Don't have an account? <a href="#">Sign Up</a></p>
									<p><a href="#">Forgot Password</a></p> -->
								</div>
	            </div>
	          </form>
	        </div>
				</div>
			</div>
		</div>
	</section>





	</body>
</html>
